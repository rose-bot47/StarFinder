<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CampFinder</title>
  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root{
      --bg:#0b0c10; --panel:#11131a; --muted:#99a3ad; --accent:#4cc9f0; --accent2:#b5179e;
      --ok:#3da35d; --tx:#4e79a7; --card:#1a1d27; --border:#262a36; --shadow:0 6px 24px rgba(0,0,0,.25);
    }
    html,body{height:100%;margin:0;background:var(--bg);color:#e8eef6;font:16px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,"Apple Color Emoji","Segoe UI Emoji"}
    .wrap{display:grid;grid-template-columns:320px 1fr;grid-template-rows:auto 1fr;min-height:100vh}
    header{grid-column:1/3;display:flex;gap:12px;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(180deg,#0d0f16,#0a0b11);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:500}
    header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
    header .sub{color:var(--muted);font-size:12px}
    header .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .chip{border:1px solid var(--border);background:var(--panel);padding:6px 10px;border-radius:999px;color:#cfe5ff;display:inline-flex;align-items:center;gap:8px}
    .chip input{accent-color:var(--accent)}
    .search{position:relative}
    .search input{background:#0e1018;color:#e8eef6;border:1px solid var(--border);border-radius:10px;padding:10px 12px 10px 36px;min-width:260px;outline:0}
    .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.55}

    aside{background:var(--panel);border-right:1px solid var(--border);overflow:auto}
    .list{padding:10px}
    .item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px;display:grid;grid-template-columns:84px 1fr;gap:10px;box-shadow:var(--shadow);margin:10px 0}
    .thumb{width:84px;height:84px;border-radius:10px;overflow:hidden;background:#0e1018;border:1px solid var(--border)}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .meta{display:flex;flex-direction:column;gap:6px}
    .meta h3{margin:0;font-size:15px}
    .meta .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#cfe5ff}
    .pill .dot{width:8px;height:8px;border-radius:50%}
    .pill .tx{background:var(--tx)}
    .pill .ok{background:var(--ok)}
    .meta .links a{font-size:12px;color:#b7cffc;text-decoration:none;border:1px solid var(--border);padding:6px 8px;border-radius:8px}
    .meta .links a:hover{border-color:#334155}

    #map{height:100%;width:100%}

    .leaflet-popup-content{margin:10px 10px 6px 10px}
    .popup-card{width:min(320px,78vw);}
    .popup-card img{width:100%;height:170px;object-fit:cover;border-radius:12px 12px 0 0;border:1px solid var(--border)}
/* Override default popup styles: hidden as new design defined below */
.popup-card img{display:none;}

    .legend{position:absolute;z-index:450;right:14px;top:82px;background:#0e1118;border:1px solid var(--border);border-radius:12px;padding:8px 10px;box-shadow:var(--shadow);color:#cfe5ff;font-size:12px}
    .legend .row{display:flex;align-items:center;gap:8px}
    .legend .dot{width:10px;height:10px;border-radius:50%}
    .legend .tx{background:var(--tx)}
    .legend .ok{background:var(--ok)}
    .toolbar{position:absolute;z-index:450;left:calc(320px + 12px);top:82px;display:flex;gap:8px}
    .floating-btn{background:#0e1118;border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:#cfe5ff;text-decoration:none;box-shadow:var(--shadow)}
    /* enhance floating button aesthetics */
    .floating-btn{
      background: rgba(255,255,255,0.08);
      color:#000000;
      border-radius:12px;
      padding:8px 12px;
      border:1px solid var(--border);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(6px);
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .floating-btn:hover{
      background: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }
    .floating-btn:active{
      transform: translateY(0);
    }

    @media (max-width: 980px){
      .wrap{grid-template-columns:1fr}
      aside{order:2;height:45vh}
      #map{order:3;height:55vh}
      .toolbar{left:12px;top:132px}
    }
      /* Preview card shown on hover */
    .preview {
      position: absolute;
      z-index: 800;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      /* subtle drop shadow to give the card a floating feel */
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      width: 180px;
      display: none;
      pointer-events: none;
    }
    .preview img {
      display: block;
      width: 100%;
      height: 120px;
      object-fit: cover;
      /* apply soft shadow around the image edges */
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 4px 12px rgba(0,0,0,0.3);
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }
    .preview .info {
      padding: 6px 8px;
      font-size: 12px;
      color: #dfe9f5;
    }

    /* Remove Leaflet popup backgrounds and tips so our custom card floats without a white box. */
    .leaflet-popup,
    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip-container {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
    .leaflet-popup-content {
      padding: 0 !important;
      margin: 0 !important;
      background: transparent !important;
      border: none !important;
    }
    .leaflet-popup-tip {
      display: none !important;
    }

    /* Style the popup close (×) button with a light translucent circle that darkens on hover. */
    .leaflet-popup-close-button {
      display: none !important;
    }
    .leaflet-popup-close-button:hover {
      display: none !important;
    }

    /* --- NEW POPUP DESIGN --- */
    .popup-card {
      width: min(340px, 80vw);
      background: rgba(15,18,26,0.92);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    .popup-hero {
      position: relative;
      height: 200px;
    }
    .popup-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .popup-hero button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      background: rgba(0,0,0,0.4);
      border: none;
      color: #fff;
      border-radius: 50%;
      cursor: pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      backdrop-filter: blur(2px);
    }
    .popup-hero button.prev { left: 10px; }
    .popup-hero button.next { right: 10px; }
    .popup-body {
      padding: 16px;
      /* Center contents in the body */
      text-align: center;
    }
    .popup-title {
      margin: 0 0 8px 0;
      color: #ffffff;
      font-size: 18px;
      font-weight: 600;
    }
    .popup-cta {
      display: inline-block;
      margin: 0 auto;
      padding: 10px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ffffff;
      text-decoration: none;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .popup-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.5);
    }

    /* Additional close button inside our popup card.  This ensures
       the user has a visible × to close the popup, regardless of
       Leaflet’s default button styling. */
    .popup-close-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      font-size: 20px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(4px);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease;
      z-index: 20;
    }
    .popup-close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
</style>
</head>
<body>
  <div class="wrap" role="application" aria-label="Dallas family camping map with cabins">
    <header>
      <div>
        <h1>CampFinder</h1>
        <div class="sub">Explore scenic state parks & cabins around Texas & Oklahoma</div>
      </div>
      <div class="controls">
        <label class="chip" title="Filter Texas parks">
          <input type="checkbox" id="filter-tx" checked /> TX
        </label>
        <label class="chip" title="Filter Oklahoma parks">
          <input type="checkbox" id="filter-ok" checked /> OK
        </label>
        <!-- Light pollution overlay toggle.  When checked, a light pollution map
             will be displayed beneath the base map.  See JS section for logic. -->
        <label class="chip" title="Show light pollution overlay">
          <input type="checkbox" id="toggle-light" /> Light
        </label>
        <div class="search" role="search">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16a6.471 6.471 0 0 0 4.23-1.57l.27.28v.79l5 5L20.49 19l-5-5ZM9.5 14C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14Z"/></svg>
          <input id="search" type="text" placeholder="Search a park… (e.g., Beavers Bend)" aria-label="Search parks" />
        </div>
      </div>
    </header>

    <aside aria-label="Park list">
      <div class="list" id="parkList" tabindex="0"></div>
    </aside>

    <div id="map" aria-label="Interactive map"></div>

    <div class="legend" aria-hidden="true">
      <div class="row"><span class="dot tx"></span> Texas</div>
      <div class="row"><span class="dot ok"></span> Oklahoma</div>
    </div>

    <div class="toolbar" aria-hidden="true">
      <button id="fitBtn" class="floating-btn" title="Zoom to all">Fit to all</button>
      <button id="clearBtn" class="floating-btn" title="Clear search">Clear search</button>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

      coords: [34.4293, -101.128],
      img: 'https://commons.wikimedia.org/wiki/Special:FilePath/Caprock%20Canyon%20State%20Park%20(13301185954).jpg',
      credit: 'Wikimedia Commons',
      infoUrl: 'https://tpwd.texas.gov/state-parks/caprock-canyons',
      bookUrl: 'https://tpwd.texas.gov/state-parks/caprock-canyons',
      blurb: 'Wild bison, red‑rock mesas & a rails‑to‑trails route; lakeside cabins & yurts.'
      ,
      imgs: [
        'https://commons.wikimedia.org/wiki/Special:FilePath/Caprock%20Canyon%20State%20Park%20(13301185954).jpg',
        'https://commons.wikimedia.org/wiki/Special:FilePath/Caprock%20Canyon%20State%20Park%20(13301185954).jpg',
        'https://commons.wikimedia.org/wiki/Special:FilePath/Caprock%20Canyon%20State%20Park%20(13301185954).jpg',

      ]
    },{
      id: 'bigbend', state: 'TX', name: 'Big Bend Ranch State Park',
      coords: [29.4709, -103.9579],
      img: 'https://commons.wikimedia.org/wiki/Special:FilePath/Solitario%20Peak.jpg',
      credit: 'Wikimedia Commons (Public Domain)',
      infoUrl: 'https://tpwd.texas.gov/state-parks/big-bend-ranch',
      bookUrl: 'https://tpwd.texas.gov/state-parks/big-bend-ranch',
      blurb: 'Remote desert park with rugged mountains & Rio Grande vistas; backcountry sites & a historic ranch house.'
      ,
      imgs: [
        'https://commons.wikimedia.org/wiki/Special:FilePath/Solitario%20Peak.jpg',

        'https://commons.wikimedia.org/wiki/Special:FilePath/Solitario%20Peak.jpg',
        'https://commons.wikimedia.org/wiki/Special:FilePath/Solitario%20Peak.jpg'
      ]
    },{
      id: 'inkslake', state: 'TX', name: 'Inks Lake State Park',
      coords: [30.7428, -98.3675],
      img: 'https://commons.wikimedia.org/wiki/Special:FilePath/Inks%20lake%20retaining%20wall.jpg',
      credit: 'Wikimedia Commons',
      infoUrl: 'https://tpwd.texas.gov/state-parks/inks-lake',
      bookUrl: 'https://tpwd.texas.gov/state-parks/inks-lake',
      blurb: 'Constant‑level lake for swimming & kayaking; pink rock outcrops & cabins.'
      ,
      imgs: [
        'https://commons.wikimedia.org/wiki/Special:FilePath/Inks%20lake%20retaining%20wall.jpg',
        'https://commons.wikimedia.org/wiki/Special:FilePath/Inks%20lake%20retaining%20wall.jpg',
        'https://commons.wikimedia.org/wiki/Special:FilePath/Inks%20lake%20retaining%20wall.jpg',
        'https://commons.wikimedia.org/wiki/Special:FilePath/Inks%20lake%20retaining%20wall.jpg'
      ]
    }
  ];

  // --- Helpers ------------------------------------------------------------
  const placeholder = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450">
      <defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient></defs>
      <rect width="100%" height="100%" fill="url(#g)"/>
      <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="system-ui,Segoe UI,Roboto" font-size="20" fill="#94a3b8">Photo unavailable</text>
    </svg>`
  );

  function imageTag(src, alt){
    return `<img src="${src}" alt="${alt}" onerror="this.onerror=null;this.src='${placeholder}';"/>`;
  }

  function stateDot(state){
    const cls = state==='TX' ? 'tx' : 'ok';
    return `<span class="pill"><span class="dot ${cls}"></span>${state}</span>`;
  }

  // Custom close button handler.  It prevents default link behavior
  // and instructs Leaflet to close the currently open popup.  This
  // is used by the `<button class="popup-close-btn">` within each
  // popup card.
  function closePopup(event){
    event.preventDefault();
    if (typeof map !== 'undefined') {
      map.closePopup();
    }
  }

  // Maintain current image index for each park; keys correspond to park id
  const sliderState = {};

  // Build a popup for a park using the simplified glass design.
  function makePopup(p){
    // Initialize slider index if not already present
    if (sliderState[p.id] === undefined) sliderState[p.id] = 0;
    // Determine the current image to display; fall back to single img if imgs missing
    const imgs = p.imgs && p.imgs.length ? p.imgs : [p.img];
    const idx = sliderState[p.id] % imgs.length;
    const imgSrc = imgs[idx];
    // Compose HTML for popup with hero image, navigation buttons, title and CTA
    return `
      <div class="popup-card" data-id="${p.id}" role="dialog" aria-label="${p.name} details">
        <button type="button" class="popup-close-btn" onclick="closePopup(event)">×</button>
        <div class="popup-hero">
          <img src="${imgSrc}" alt="${p.name} photo" onerror="this.onerror=null;this.src='${placeholder}'" />
          <button class="prev" title="Previous image">‹</button>
          <button class="next" title="Next image">›</button>
        </div>
        <div class="popup-body">
          <div class="popup-title">${p.name}</div>
          <a class="popup-cta" href="${p.infoUrl}" target="_blank" rel="noopener">Open Park Page</a>
        </div>
      </div>`;
  }

  // --- Map ---------------------------------------------------------------
  const map = L.map('map', {zoomControl:false});
  L.control.zoom({position:'bottomright'}).addTo(map);
  const tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const markers = [];
  const group = L.featureGroup().addTo(map);

  // --- Light pollution overlay -------------------------------------------------
  // Define a tile layer for light pollution.  This uses an ArcGIS tile cache
  // representing global light pollution intensity.  Tiles follow the pattern
  // `/tile/{z}/{y}/{x}` appended to the map service base.  Opacity is set
  // moderately low so that underlying basemap features remain visible.  We
  // assign a higher zIndex than the base map so that markers appear above
  // this overlay.  Attribution is provided per the tile provider’s license.
  const lightPollution = L.tileLayer(
    'https://tiles.arcgis.com/tiles/j80Jz20at6Bi0thr/arcgis/rest/services/Light_Pollution_Pixelated/MapServer/tile/{z}/{y}/{x}',
    {
      attribution: 'Light pollution overlay © ArcGIS, International Dark-Sky Association',
      opacity: 0.6,
      // Ensure overlay stays below markers but above base map by giving it a low zIndex
      zIndex: 10
    }
  );


  parks.forEach(p => {
    const m = L.marker(p.coords, {title: p.name});
    m.bindPopup(makePopup(p));
    m.on('click', () => m.openPopup());
    m.park = p; // attach for filtering
    m.addTo(group);
    markers.push(m);
  });

  map.setView([33.38, -95.9], 6);

  // --- Sidebar list ------------------------------------------------------
  const list = document.getElementById('parkList');
  function renderList(items){
    list.innerHTML = '';
    items.forEach(p => {
      const el = document.createElement('div');
      el.className = 'item';
      el.innerHTML = `
        <div class="thumb">${imageTag(p.img, p.name + ' thumbnail')}</div>
        <div class="meta">
          <h3>${p.name}</h3>
          <div class="pill">${stateDot(p.state)}</div>
          <div class="links" aria-label="Quick links">
            <a href="#" data-id="${p.id}" class="fly">📍 View on map</a>
            <a href="${p.bookUrl}" target="_blank" rel="noopener">🛎️ Book</a>
            <a href="${p.infoUrl}" target="_blank" rel="noopener">ℹ️ Info</a>
          </div>
        </div>`;
      list.appendChild(el);
    });
  }
  renderList(parks);

  list.addEventListener('click', (e) => {
    const a = e.target.closest('a.fly');
    if(!a) return;
    e.preventDefault();
    const id = a.getAttribute('data-id');
    const m = markers.find(x => x.park.id === id);
    if(m){ map.flyTo(m.getLatLng(), 11, {duration: .9}); m.openPopup(); }
  });

  // --- Filters & search --------------------------------------------------
  const fTX = document.getElementById('filter-tx');
  const fOK = document.getElementById('filter-ok');
  function applyFilters(){
    const showTX = fTX.checked, showOK = fOK.checked;
    const visible = [];
    markers.forEach(m => {
      const s = m.park.state;
      const shouldShow = (s==='TX' && showTX) || (s==='OK' && showOK);
      if(shouldShow){ m.addTo(group); visible.push(m.park); }
      else { group.removeLayer(m); }
    });
    renderList(visible);
    if(visible.length){ map.fitBounds(L.featureGroup(visible.map(v=>L.marker(v.coords))).getBounds().pad(0.12)); }
  }
  fTX.addEventListener('change', applyFilters);
  fOK.addEventListener('change', applyFilters);

  const search = document.getElementById('search');
  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    markers.forEach(m => {
      const match = m.park.name.toLowerCase().includes(q);
      if(q === ''){ m.addTo(group); }
      else if(match){ m.addTo(group); }
      else { group.removeLayer(m); }
    });
    const visibleParks = markers.filter(m=>group.hasLayer(m)).map(m=>m.park);
    renderList(visibleParks);
  });

  document.getElementById('fitBtn').addEventListener('click', () => {
    if(group.getLayers().length){ map.setView([33.38, -95.9], 6); }
  });
  document.getElementById('clearBtn').addEventListener('click', () => { search.value=''; applyFilters(); });

  // --- Light pollution toggle event --------------------------------------
  // Attach a change listener to the light pollution checkbox.  When the
  // checkbox is checked, add the light pollution tile layer to the map.  When
  // unchecked, remove it.  This keeps the overlay optional and ensures
  // markers remain visible.  The layer is defined above near map setup.
  const toggleLight = document.getElementById('toggle-light');
  if (toggleLight) {
    toggleLight.addEventListener('change', () => {
      if (toggleLight.checked) {
        lightPollution.addTo(map);
      } else {
        map.removeLayer(lightPollution);
      }
    });
  }

  
  // --- Preview hover functionality ---
  const preview = document.createElement('div');
  preview.className = 'preview';
  document.body.appendChild(preview);

  function showPreview(p, x, y) {
    // Build preview HTML with fallback
    const imgHtml = `<img src="${p.img}" alt="${p.name} preview" onerror="this.onerror=null;this.src='${placeholder}';">`;
    preview.innerHTML = imgHtml + `<div class="info">${p.name}</div>`;
    preview.style.left = x + 'px';
    preview.style.top = y + 'px';
    preview.style.display = 'block';
  }
  function hidePreview() {
    preview.style.display = 'none';
  }

  // Event delegation for hover on sidebar list items
  list.addEventListener('mouseover', (e) => {
    const item = e.target.closest('.item');
    if(item) {
      const fly = item.querySelector('a.fly');
      if(fly){
        const id = fly.getAttribute('data-id');
        const park = parks.find(p => p.id === id);
        if(park){
          const rect = item.getBoundingClientRect();
          showPreview(park, rect.right + 10 + window.scrollX, rect.top + window.scrollY);
        }
      }
    }
  });
  list.addEventListener('mouseout', (e) => {
    const item = e.target.closest('.item');
    if(item) { hidePreview(); }
  });

  // Keyboard focus helper for accessibility
  list.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){
      const firstLink = e.target.querySelector('a.fly');
      if(firstLink){ firstLink.click(); }
    }
  });

  // --- Popup slider controls ---
  // Listen for clicks on previous/next buttons inside popups to cycle images
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.popup-hero button');
    if (!btn) return;
    const card = btn.closest('.popup-card');
    if (!card) return;
    const pid = card.getAttribute('data-id');
    const park = parks.find(p => p.id === pid);
    if (!park) return;
    const imgs = park.imgs && park.imgs.length ? park.imgs : [park.img];
    // Initialize slider state if not present
    if (sliderState[pid] === undefined) sliderState[pid] = 0;
    // Update index based on button direction
    if (btn.classList.contains('prev')) {
      sliderState[pid] = (sliderState[pid] - 1 + imgs.length) % imgs.length;
    } else {
      sliderState[pid] = (sliderState[pid] + 1) % imgs.length;
    }
    // Update the image source
    const imgEl = card.querySelector('.popup-hero img');
    if (imgEl) {
      imgEl.src = imgs[sliderState[pid]];
    }
  });
  </script>
